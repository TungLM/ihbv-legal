<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">

    <title>iHBV Legal Documents</title>
    <script>
        const language = (navigator.language || navigator.userLanguage || "").toLowerCase();
        const isVietnamese = language.startsWith("vi");
        document.addEventListener("DOMContentLoaded", () => {
            if (!isVietnamese) return;
            document.documentElement.lang = "vi";
            document.title = "Tài liệu pháp lý iHBV";
            document.getElementById("page-title").textContent = "Tài liệu pháp lý iHBV";
            document.getElementById("page-intro").textContent = "Tài liệu pháp lý chính thức cho iHBV bởi TM Tech Labs.";
        });
    </script>
    <style>
        :root { color-scheme: light; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            max-width: 720px;
            margin: 0 auto;
            padding: 40px 20px 56px;
            line-height: 1.6;
            color: #24313f;
            background: #ffffff;
        }
        h1 { color: #00478d; font-size: 2rem; line-height: 1.2; margin-bottom: 8px; }
        p { color: #5f6f80; }
        a { color: #00478d; font-weight: 700; }
        li { margin: 10px 0; }
    </style>
</head>
